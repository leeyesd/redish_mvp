<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plati</title>
<style>
  :root {
    --ink: #251925;
    --muted: #776376;
    --cream: #fff8dc;
    --pink: #ff7ab8;
    --hot: #ff3d8b;
    --mint: #81f4d7;
    --lime: #d8ff57;
    --blue: #72a7ff;
    --peach: #ffb36b;
    --card: #fffef7;
    --line: #251925;
    --shadow: 7px 8px 0 #251925;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: ui-rounded, "Apple SD Gothic Neo", "Pretendard", system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 10% 10%, rgba(255, 122, 184, .35) 0 110px, transparent 112px),
      radial-gradient(circle at 88% 14%, rgba(129, 244, 215, .45) 0 130px, transparent 132px),
      radial-gradient(circle at 20% 90%, rgba(216, 255, 87, .34) 0 160px, transparent 162px),
      linear-gradient(135deg, #fffdf2 0%, #ffe5f2 42%, #e5fff8 100%);
  }

  button, input { font: inherit; }

  .app {
    width: min(960px, calc(100% - 32px));
    margin: 0 auto;
    padding: 30px 0 56px;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 2px solid var(--line);
    border-radius: 999px;
    padding: 8px 14px;
    background: var(--lime);
    box-shadow: 4px 5px 0 var(--line);
    font-weight: 900;
    letter-spacing: .04em;
  }

  .hero {
    margin: 42px 0 20px;
    text-align: center;
  }

  h1 {
    margin: 0 auto;
    max-width: 780px;
    font-size: clamp(34px, 7vw, 70px);
    line-height: .98;
    letter-spacing: 0;
    text-wrap: balance;
  }

  .mark {
    display: inline-block;
    transform: rotate(-2deg);
    color: var(--hot);
    text-shadow: 3px 3px 0 var(--lime), 5px 5px 0 var(--line);
  }

  .protein-wrap {
    margin-top: 30px;
    padding: 18px;
    border: 3px solid var(--line);
    border-radius: 28px;
    background:
      linear-gradient(90deg, rgba(37,25,37,.08) 1px, transparent 1px),
      linear-gradient(rgba(37,25,37,.08) 1px, transparent 1px),
      rgba(255,255,255,.65);
    background-size: 22px 22px;
    box-shadow: var(--shadow);
  }

  .protein-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 14px;
  }

  .protein-card {
    position: relative;
    min-height: 128px;
    border: 3px solid var(--line);
    border-radius: 22px;
    background: var(--card);
    box-shadow: 5px 6px 0 var(--line);
    cursor: pointer;
    transform: translateY(0) rotate(var(--tilt));
    transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    overflow: hidden;
  }

  .protein-card::before {
    content: "";
    position: absolute;
    inset: 8px;
    border-radius: 16px;
    background: var(--tone);
    opacity: .55;
  }

  .protein-card::after {
    content: "";
    position: absolute;
    width: 38px;
    height: 38px;
    right: -8px;
    top: -8px;
    border: 3px solid var(--line);
    border-radius: 50%;
    background: var(--lime);
  }

  .protein-card:hover {
    transform: translateY(-5px) rotate(0);
    box-shadow: 7px 10px 0 var(--line);
  }

  .protein-card.selected {
    background: #fff0f8;
    transform: translateY(-8px) rotate(0) scale(1.03);
    box-shadow: 8px 11px 0 var(--hot);
  }

  .protein-card.selected .check { opacity: 1; transform: scale(1); }

  .protein-inner {
    position: relative;
    z-index: 1;
    height: 100%;
    display: grid;
    place-items: center;
    gap: 7px;
    padding: 18px 8px 14px;
  }

  .protein-icon {
    display: grid;
    place-items: center;
    width: 58px;
    height: 58px;
    border: 3px solid var(--line);
    border-radius: 18px;
    background: #fff;
    box-shadow: 3px 4px 0 var(--line);
    font-size: 30px;
  }

  .protein-name {
    font-weight: 900;
    font-size: 15px;
  }

  .check {
    position: absolute;
    left: 10px;
    top: 10px;
    z-index: 2;
    width: 30px;
    height: 30px;
    display: grid;
    place-items: center;
    border: 2px solid var(--line);
    border-radius: 50%;
    background: var(--hot);
    color: #fff;
    font-weight: 900;
    opacity: 0;
    transform: scale(.6);
    transition: .16s ease;
  }

  .subcopy {
    max-width: 660px;
    margin: 24px auto 0;
    font-size: 15px;
    line-height: 1.65;
    color: var(--muted);
    text-align: center;
    font-weight: 700;
  }

  .action-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 22px;
    flex-wrap: wrap;
  }

  .counter {
    border: 2px solid var(--line);
    border-radius: 999px;
    padding: 10px 14px;
    background: #fff;
    box-shadow: 3px 4px 0 var(--line);
    font-weight: 900;
  }

  .make-btn, .reset-btn {
    border: 3px solid var(--line);
    border-radius: 999px;
    padding: 13px 18px;
    font-weight: 950;
    cursor: pointer;
    box-shadow: 4px 5px 0 var(--line);
    transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
  }

  .make-btn {
    background: var(--hot);
    color: #fff;
  }

  .make-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  .reset-btn { background: var(--mint); color: var(--ink); }

  .make-btn:not(:disabled):hover,
  .reset-btn:hover {
    transform: translateY(-3px);
    box-shadow: 6px 8px 0 var(--line);
  }

  .results {
    display: none;
    margin-top: 34px;
    border: 3px solid var(--line);
    border-radius: 28px;
    background: rgba(255, 254, 247, .92);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .results.visible { display: block; }

  .result-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 18px;
    border-bottom: 3px solid var(--line);
    background: var(--lime);
  }

  .result-title {
    font-size: 22px;
    font-weight: 950;
  }

  .selected-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  .tag {
    border: 2px solid var(--line);
    border-radius: 999px;
    padding: 6px 10px;
    background: #fff;
    font-size: 13px;
    font-weight: 900;
  }

  .schedule {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    padding: 18px;
  }

  .day-card {
    border: 2px solid var(--line);
    border-radius: 18px;
    background: #fff;
    box-shadow: 4px 5px 0 rgba(37,25,37,.88);
    padding: 15px;
  }

  .day-card:nth-child(3n+1) { background: #fff1f7; }
  .day-card:nth-child(3n+2) { background: #edfff9; }
  .day-card:nth-child(3n) { background: #fff8d6; }

  .day-label {
    display: inline-block;
    border: 2px solid var(--line);
    border-radius: 999px;
    padding: 5px 9px;
    background: var(--blue);
    color: #fff;
    font-size: 12px;
    font-weight: 950;
  }

  .meal-name {
    margin-top: 12px;
    font-size: 19px;
    line-height: 1.28;
    font-weight: 950;
  }

  .meal-meta {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    font-weight: 700;
  }

  .batch {
    display: inline-block;
    margin-top: 10px;
    border-radius: 10px;
    padding: 6px 8px;
    background: rgba(255, 61, 139, .13);
    color: #8d174d;
    font-size: 12px;
    font-weight: 950;
  }

  .shopping {
    padding: 0 18px 18px;
  }

  .shopping-box {
    border: 2px solid var(--line);
    border-radius: 18px;
    background: #fff;
    padding: 15px;
  }

  .shopping-title {
    font-weight: 950;
    margin-bottom: 10px;
  }

  .shopping-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .shop-item {
    border: 2px solid var(--line);
    border-radius: 999px;
    padding: 7px 10px;
    background: #fff8dc;
    font-size: 13px;
    font-weight: 850;
  }

  .empty {
    display: none;
    margin-top: 18px;
    border: 3px solid var(--line);
    border-radius: 18px;
    padding: 14px;
    background: #fff;
    box-shadow: 4px 5px 0 var(--line);
    font-weight: 900;
    text-align: center;
  }

  .empty.visible { display: block; }

  @media (max-width: 760px) {
    .app { width: min(100% - 22px, 960px); padding-top: 18px; }
    .protein-wrap { padding: 12px; border-radius: 22px; }
    .protein-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .protein-card { min-height: 118px; }
    .schedule { grid-template-columns: 1fr; }
    .result-head { align-items: flex-start; flex-direction: column; }
    .selected-tags { justify-content: flex-start; }
  }
</style>
</head>
<body>
<main class="app">
  <div class="brand">Plati</div>

  <section class="hero">
    <h1><span class="mark">3가지 고르면</span><br>저녁메뉴 고민 끝</h1>

    <div class="protein-wrap" aria-label="단백질 선택">
      <div class="protein-grid" id="protein-grid"></div>
    </div>

    <p class="subcopy">매운양념만 추가하면 어른 것까지 해결되는 유아식 레시피로만 저녁메뉴 제안한다</p>

    <div class="action-row">
      <div class="counter" id="counter">0 / 3 선택</div>
      <button class="make-btn" id="make-btn" disabled>저녁 스케줄 보기</button>
      <button class="reset-btn" id="reset-btn">다시 고르기</button>
    </div>

    <div class="empty" id="empty">선택한 단백질에 맞는 레시피가 아직 부족해요. recipes.json에 메뉴를 더 넣어주세요.</div>
  </section>

  <section class="results" id="results" aria-live="polite">
    <div class="result-head">
      <div class="result-title">이번 주 저녁 루틴</div>
      <div class="selected-tags" id="selected-tags"></div>
    </div>
    <div class="schedule" id="schedule"></div>
    <div class="shopping">
      <div class="shopping-box">
        <div class="shopping-title">한 번 장볼 것</div>
        <div class="shopping-list" id="shopping-list"></div>
      </div>
    </div>
  </section>
</main>

<script>
const proteins = [
  { id: 'chicken', name: '닭고기', icon: '🍗', tone: '#ffd5e8', tilt: '-2deg' },
  { id: 'beef', name: '소고기', icon: '🥩', tone: '#ffc8bf', tilt: '2deg' },
  { id: 'pork', name: '돼지고기', icon: '🥓', tone: '#ffe0b5', tilt: '-1deg' },
  { id: 'fish', name: '흰살생선', icon: '🐟', tone: '#c9ecff', tilt: '1deg' },
  { id: 'salmon', name: '연어', icon: '🍣', tone: '#ffcbb0', tilt: '-2deg' },
  { id: 'shrimp', name: '새우', icon: '🍤', tone: '#ffe28a', tilt: '2deg' },
  { id: 'tofu', name: '두부', icon: '◻', tone: '#e4ffd1', tilt: '-1deg' },
  { id: 'egg', name: '계란', icon: '🥚', tone: '#fff09a', tilt: '1deg' },
  { id: 'bean', name: '콩', icon: '🫘', tone: '#d5ffc7', tilt: '-2deg' },
  { id: 'cheese', name: '치즈', icon: '🧀', tone: '#fff06d', tilt: '2deg' }
];

let selected = [];
let recipes = [];

const grid = document.getElementById('protein-grid');
const counter = document.getElementById('counter');
const makeBtn = document.getElementById('make-btn');
const resetBtn = document.getElementById('reset-btn');
const results = document.getElementById('results');
const empty = document.getElementById('empty');

init();

async function init() {
  renderProteinCards();
  await loadRecipes();
  makeBtn.addEventListener('click', makeSchedule);
  resetBtn.addEventListener('click', resetSelection);
}

function renderProteinCards() {
  grid.innerHTML = proteins.map((protein) => `
    <button class="protein-card" style="--tone:${protein.tone}; --tilt:${protein.tilt}" data-id="${protein.id}" aria-pressed="false">
      <span class="check">✓</span>
      <span class="protein-inner">
        <span class="protein-icon">${protein.icon}</span>
        <span class="protein-name">${protein.name}</span>
      </span>
    </button>
  `).join('');

  grid.querySelectorAll('.protein-card').forEach((card) => {
    card.addEventListener('click', () => toggleProtein(card.dataset.id));
  });
}

async function loadRecipes() {
  try {
    const response = await fetch('/recipes.json');
    recipes = await response.json();
  } catch {
    recipes = [];
  }
}

function toggleProtein(id) {
  if (selected.includes(id)) {
    selected = selected.filter((item) => item !== id);
  } else if (selected.length < 3) {
    selected = [...selected, id];
  }

  updateSelection();
}

function updateSelection() {
  grid.querySelectorAll('.protein-card').forEach((card) => {
    const isSelected = selected.includes(card.dataset.id);
    card.classList.toggle('selected', isSelected);
    card.setAttribute('aria-pressed', String(isSelected));
  });

  counter.textContent = `${selected.length} / 3 선택`;
  makeBtn.disabled = selected.length !== 3;
  results.classList.remove('visible');
  empty.classList.remove('visible');
}

function makeSchedule() {
  const matches = recipes
    .map((recipe) => ({
      ...recipe,
      score: recipe.proteins.filter((protein) => selected.includes(protein)).length
    }))
    .filter((recipe) => recipe.score > 0)
    .sort((a, b) => b.score - a.score || b.batch_servings - a.batch_servings);

  if (!matches.length) {
    empty.classList.add('visible');
    results.classList.remove('visible');
    return;
  }

  const picked = pickBalanced(matches, selected);
  const days = ['오늘', '내일', '모레', '4일차', '5일차', '6일차'];
  const schedule = buildSchedule(picked, days);

  renderResults(schedule, picked);
}

function pickBalanced(matches, selectedIds) {
  const picked = [];
  selectedIds.forEach((protein) => {
    const recipe = matches.find((item) => item.proteins.includes(protein) && !picked.includes(item));
    if (recipe) picked.push(recipe);
  });

  matches.forEach((recipe) => {
    if (picked.length < 4 && !picked.includes(recipe)) picked.push(recipe);
  });

  return picked.slice(0, 4);
}

function buildSchedule(picked, days) {
  const schedule = [];
  let dayIndex = 0;

  picked.forEach((recipe) => {
    const servings = Math.max(1, Math.min(recipe.batch_servings || 2, 2));
    for (let i = 0; i < servings && dayIndex < days.length; i += 1) {
      schedule.push({
        day: days[dayIndex],
        recipe,
        repeat: i > 0
      });
      dayIndex += 1;
    }
  });

  return schedule.slice(0, 6);
}

function renderResults(schedule, picked) {
  const tags = document.getElementById('selected-tags');
  const scheduleEl = document.getElementById('schedule');
  const shopping = document.getElementById('shopping-list');

  tags.innerHTML = selected.map((id) => `<span class="tag">${getProteinName(id)}</span>`).join('');

  scheduleEl.innerHTML = schedule.map((item) => `
    <article class="day-card">
      <div class="day-label">${item.day}${item.repeat ? ' · 소분' : ' · 조리'}</div>
      <div class="meal-name">${item.recipe.name}</div>
      <div class="meal-meta">${item.recipe.note}</div>
      <div class="batch">${item.recipe.adult_tip}</div>
    </article>
  `).join('');

  const ingredients = [...new Set(picked.flatMap((recipe) => recipe.ingredients))];
  shopping.innerHTML = ingredients.map((item) => `<span class="shop-item">${item}</span>`).join('');

  empty.classList.remove('visible');
  results.classList.add('visible');
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetSelection() {
  selected = [];
  updateSelection();
}

function getProteinName(id) {
  return proteins.find((protein) => protein.id === id)?.name || id;
}
</script>
</body>
</html>
