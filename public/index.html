<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REDISH</title>
<style>
  @font-face {
    font-family: "Kkukkukk";
    src: url("./assets/fonts/MemomentKkukkukk.ttf") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --ink: #050505;
    --muted: #515151;
    --paper: #fbfaf3;
    --red: #f35a42;
    --blue: #a9c3e8;
    --lavender: #c9bfff;
    --pink: #efbed7;
    --yellow: #f2ef56;
    --green: #71b394;
    --brown: #bd806f;
    --shadow: 0 16px 36px rgba(0, 0, 0, .08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Kkukkukk", "Apple SD Gothic Neo", "Pretendard", system-ui, sans-serif;
    color: var(--ink);
    background: #f2f0e8;
  }

  button, input { font: inherit; }

  .app {
    position: relative;
    width: min(430px, 100%);
    min-height: 100vh;
    margin: 0 auto;
    padding: 30px 28px 48px;
    background: var(--paper);
    box-shadow: var(--shadow);
  }

  .app::before,
  .app::after {
    content: none;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0;
    background: transparent;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0;
  }

  .hero {
    margin: 34px 0 20px;
    text-align: left;
  }

  .hero.hidden {
    display: none;
  }

  h1 {
    margin: 0 auto;
    max-width: 350px;
    font-size: clamp(38px, 11vw, 54px);
    line-height: .92;
    letter-spacing: 0;
    text-wrap: balance;
    color: var(--ink);
    font-weight: 400;
  }

  .mark {
    display: inline-block;
    color: var(--ink);
  }

  h1 .red-word {
    color: var(--red);
  }

  .mascot-zone {
    display: grid;
    justify-items: center;
    gap: 12px;
    margin: 24px auto 0;
  }

  .radish-mascot {
    width: 116px;
    height: 122px;
    display: block;
  }

  .radish-mascot svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  .speech-bubble {
    position: relative;
    width: min(330px, 100%);
    margin: 0 auto;
    padding: 16px 18px;
    border-radius: 28px;
    background: #fff;
    color: #000;
    text-align: center;
    font-size: 15px;
    line-height: 1.45;
    box-shadow: 0 10px 24px rgba(0, 0, 0, .08);
  }

  .speech-bubble::before {
    content: "";
    position: absolute;
    left: 50%;
    top: -12px;
    width: 26px;
    height: 22px;
    background: #fff;
    border-radius: 4px 0 16px 0;
    transform: translateX(-50%) rotate(45deg);
  }

  .protein-wrap {
    margin-top: 32px;
    padding: 0;
    background: transparent;
  }

  .protein-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .protein-card {
    position: relative;
    min-height: 148px;
    border: 0;
    border-radius: 34px;
    background: var(--tone);
    box-shadow: none;
    cursor: pointer;
    transform: translateY(0);
    transition: transform .16s ease, filter .16s ease, opacity .16s ease, box-shadow .16s ease;
    overflow: hidden;
  }

  .protein-card::before {
    content: none;
  }

  .protein-card::after {
    content: none;
  }

  .protein-card:hover {
    transform: translateY(-2px);
  }

  .protein-card.selected {
    transform: translateY(-7px);
    filter: saturate(1.08) contrast(1.04);
    box-shadow:
      0 22px 38px rgba(0, 0, 0, .24),
      0 8px 14px rgba(0, 0, 0, .15);
  }

  .protein-card.selected .check { opacity: 1; transform: scale(1); }

  .protein-inner {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    padding: 19px 19px 17px;
  }

  .protein-icon {
    display: grid;
    place-items: center;
    width: 64px;
    height: 64px;
    margin-top: auto;
  }

  .protein-icon svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  .protein-name {
    font-size: 19px;
    line-height: 1.05;
    color: #000;
  }

  .check {
    position: absolute;
    right: 13px;
    bottom: 13px;
    z-index: 2;
    width: 28px;
    height: 28px;
    display: grid;
    place-items: center;
    border: 0;
    border-radius: 999px;
    background: #000;
    color: #fff;
    opacity: 0;
    transform: scale(.6);
    transition: .16s ease;
  }

  .action-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 22px;
    flex-wrap: nowrap;
  }

  .action-row .make-btn {
    width: 166px;
    min-width: 166px;
  }

  .make-btn, .reset-btn {
    border: 0;
    border-radius: 999px;
    padding: 12px 16px;
    cursor: pointer;
    box-shadow: none;
    transition: transform .12s ease, opacity .12s ease;
  }

  .make-btn {
    background: #000;
    color: #fff;
  }

  .make-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  .reset-btn { background: #ece8dd; color: #000; }

  .icon-btn {
    width: 44px;
    height: 44px;
    display: inline-grid;
    place-items: center;
    padding: 0;
    font-size: 20px;
    line-height: 1;
  }

  .counter {
    width: 78px;
    min-width: 78px;
    border: 0;
    border-radius: 999px;
    padding: 12px 0;
    background: #ece8dd;
    color: #000;
    text-align: center;
  }

  .make-btn:not(:disabled):hover,
  .reset-btn:hover {
    transform: translateY(-3px);
  }

  .results {
    display: none;
    margin-top: 28px;
    border: 0;
    background: transparent;
    box-shadow: none;
  }

  .results.visible { display: block; }

  .result-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 0 0 22px;
    border-bottom: 0;
    background: transparent;
  }

  .result-title {
    margin: 0;
    font-size: clamp(34px, 10vw, 48px);
    line-height: .94;
    color: #000;
  }

  .result-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .selected-tags {
    display: flex;
    flex-wrap: nowrap;
    gap: 8px;
    justify-content: flex-end;
  }

  .tag {
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    border-radius: 999px;
    padding: 7px;
    background: #ece8dd;
  }

  .tag svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .schedule {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    padding: 0;
  }

  .day-card {
    border: 0;
    border-radius: 24px;
    background: var(--card-tone);
    box-shadow: none;
    padding: 18px;
  }

  .day-meta-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-size: 12px;
    color: rgba(0, 0, 0, .46);
  }

  .meal-name {
    margin-top: 10px;
    font-size: 19px;
    line-height: 1.28;
    color: #000;
  }

  .meal-meta {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    font-weight: 400;
  }

  .batch {
    display: inline-block;
    margin-top: 10px;
    border-radius: 10px;
    padding: 6px 8px;
    background: #fff;
    color: #000;
    font-size: 12px;
    font-weight: 700;
  }

  .shopping {
    padding: 18px 0 0;
  }

  .shopping-box {
    border: 0;
    border-radius: 24px;
    background: #f5f2ea;
    padding: 15px;
  }

  .shopping-title {
    color: #000;
    margin-bottom: 10px;
  }

  .shopping-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .shop-item {
    border: 0;
    border-radius: 999px;
    padding: 7px 10px;
    background: #fff;
    font-size: 13px;
    font-weight: 400;
  }

  .empty {
    display: none;
    margin-top: 18px;
    border: 0;
    border-radius: 24px;
    padding: 14px;
    background: #fff;
    box-shadow: none;
    text-align: center;
  }

  .empty.visible { display: block; }

  @media (max-width: 430px) {
    body { background: var(--paper); }
    .app { min-height: 100vh; margin: 0 auto; box-shadow: none; }
    .result-head { align-items: flex-start; flex-direction: column; }
    .selected-tags { justify-content: flex-start; }
  }
</style>
</head>
<body>
<main class="app">
  <div class="brand">REDISH</div>

  <section class="hero">
    <h1><span class="mark">2개만 고르면</span><br><span class="red-word">저녁메뉴</span> 고민 끝</h1>

    <div class="mascot-zone" aria-label="REDISH 빨간무 캐릭터">
      <div class="radish-mascot" aria-hidden="true">
        <svg viewBox="0 0 120 126">
          <path fill="#3e8c42" d="M53 23 35 2 58 8 63 27z"/>
          <path fill="#1f7439" d="M62 25 65 0 79 21 73 39z"/>
          <path fill="#2f8f45" d="M72 31 101 12 90 41 68 48z"/>
          <path fill="#215d34" opacity=".58" d="M43 24 79 23 91 40 71 52 43 45z"/>
          <path fill="#f0522d" d="M22 43 44 22 82 25 105 49 100 88 72 113 34 105 14 78z"/>
          <path fill="#d43b24" opacity=".55" d="M82 25 105 49 100 88 72 113 64 75 69 38z"/>
          <path fill="#ff7a3d" opacity=".45" d="M28 48 45 31 69 30 47 51z"/>
          <circle cx="43" cy="63" r="3.2" fill="#35180f"/>
          <circle cx="62" cy="60" r="2.8" fill="#35180f"/>
          <circle cx="41.7" cy="61.8" r="1" fill="#fff1d8" opacity=".75"/>
          <circle cx="60.8" cy="58.9" r=".9" fill="#fff1d8" opacity=".72"/>
          <path d="M51 75c4 2 8 1 11-2" fill="none" stroke="#35180f" stroke-width="2.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="speech-bubble">양념만 추가하면 2번 먹을 수 있는<br>일타이피 메뉴만 나와요!</div>
    </div>

    <div class="protein-wrap" aria-label="단백질 선택">
      <div class="protein-grid" id="protein-grid"></div>
    </div>

    <div class="action-row">
      <div class="counter" id="counter">0/2 선택</div>
      <button class="make-btn" id="make-btn" disabled>저녁메뉴 만들기</button>
      <button class="reset-btn icon-btn" id="reset-btn" aria-label="다시 고르기" title="다시 고르기">↻</button>
    </div>

    <div class="empty" id="empty">선택한 단백질에 맞는 레시피가 아직 부족해요. recipes.json에 메뉴를 더 넣어주세요.</div>
  </section>

  <section class="results" id="results" aria-live="polite">
    <div class="result-head">
      <h2 class="result-title">이번 주 저녁메뉴 어때요?</h2>
      <div class="result-actions">
        <div class="selected-tags" id="selected-tags"></div>
        <button class="reset-btn" id="remake-btn">다시만들기</button>
      </div>
    </div>
    <div class="schedule" id="schedule"></div>
    <div class="shopping">
      <div class="shopping-box">
        <div class="shopping-title">한 번 장볼 것</div>
        <div class="shopping-list" id="shopping-list"></div>
      </div>
    </div>
  </section>
</main>

<script>
const proteins = [
  { id: 'chicken', name: '닭고기', icon: 'drumstick', tone: '#f2a095' },
  { id: 'beef', name: '소고기', icon: 'steak', tone: '#d9847c' },
  { id: 'pork', name: '돼지고기', icon: 'meat', tone: '#efb8ad' },
  { id: 'duck', name: '오리고기', icon: 'duck', tone: '#e7aaa0' },
  { id: 'whitefish', name: '흰살생선', icon: 'fish', tone: '#b9d3ea' },
  { id: 'bluefish', name: '등푸른생선', icon: 'bluefish', tone: '#8fb8d8' },
  { id: 'shrimp', name: '새우', icon: 'shrimp', tone: '#a9c8e5' },
  { id: 'tofu', name: '두부', icon: 'cube', tone: '#b8ada0' },
  { id: 'egg', name: '계란', icon: 'egg', tone: '#c3ad7c' },
  { id: 'bean', name: '콩', icon: 'beans', tone: '#b9866d' }
];

const icons = {
  drumstick: '<svg viewBox="0 0 64 64" aria-hidden="true"><path fill="#f28c2f" d="M33 7 48 9 58 20 55 35 43 46 27 44 18 32 20 17z"/><path fill="#d85f32" opacity=".58" d="M42 10 58 20 55 35 43 46 36 36 38 20z"/><path fill="#f5d6a6" d="M18 35 9 43 7 52 14 58 23 55 30 45z"/><path fill="#fff0c9" opacity=".55" d="M29 13 43 12 50 19 38 20z"/></svg>',
  duck: '<svg viewBox="0 0 64 64" aria-hidden="true"><path fill="#b35d38" d="M13 35 20 18 37 10 53 16 58 31 50 47 31 55 15 49z"/><path fill="#7c3d28" opacity=".5" d="M37 10 53 16 58 31 50 47 35 39 34 22z"/><path fill="#e5b067" d="M8 35 15 30 24 34 20 43 10 43z"/><path fill="#f3cc8b" opacity=".55" d="M22 20 36 15 47 19 33 24z"/></svg>',
  steak: '<svg viewBox="0 0 64 64" aria-hidden="true"><path fill="#b74f45" d="M13 13 35 6 54 17 59 36 48 53 25 58 8 47 5 29z"/><path fill="#8f332d" opacity=".55" d="M35 6 54 17 59 36 44 34 31 23z"/><path fill="#f2c3ae" d="M22 24 35 20 44 28 42 40 29 45 18 38z"/><path fill="#fff3e4" opacity=".48" d="M24 26 34 23 39 28 30 31z"/></svg>',
  meat: '<svg viewBox="0 0 64 64" aria-hidden="true"><path fill="#e67468" d="M11 17 25 7 39 10 46 20 58 27 55 43 43 51 26 50 14 39 6 30z"/><path fill="#c74e49" opacity=".54" d="M39 10 46 20 58 27 55 43 42 37 36 24z"/><path fill="#ffd3c8" d="M25 22 36 20 43 27 41 37 30 41 21 35z"/><path fill="#fff2ed" opacity=".5" d="M27 24 36 23 39 27 29 29z"/></svg>',
  fish: '<svg viewBox="0 0 64 64" aria-hidden="true"><path fill="#227a91" d="M8 34 18 21 38 14 55 24 60 36 48 47 28 49 17 42z"/><path fill="#0f5b6b" opacity=".6" d="M38 14 55 24 60 36 48 47 31 41 34 25z"/><path fill="#83c6d5" opacity=".72" d="M18 21 8 12 8 34z"/><circle cx="47" cy="29" r="3" fill="#083f4c"/><path fill="#d3eef3" opacity=".45" d="M21 25 36 20 47 25 30 29z"/></svg>',
  bluefish: '<svg viewBox="0 0 64 64" aria-hidden="true"><path fill="#1f5f96" d="M7 33 20 18 43 13 58 25 56 41 39 52 20 47z"/><path fill="#0d3f70" opacity=".62" d="M43 13 58 25 56 41 39 52 35 34z"/><path fill="#6fa7ca" opacity=".66" d="M20 18 8 11 7 33z"/><path fill="#12375e" opacity=".52" d="M23 25 42 20 53 27 34 30z"/><circle cx="47" cy="27" r="3" fill="#081f33"/></svg>',
  shrimp: '<svg viewBox="0 0 64 64" aria-hidden="true"><path fill="#ef7c2f" d="M48 8 59 19 57 34 45 48 27 56 12 52 5 41 11 30 25 30 32 39 42 33 44 22 35 19 28 15 33 8z"/><path fill="#c95429" opacity=".55" d="M48 8 59 19 57 34 45 48 42 33 44 22z"/><path fill="#ffd1a6" opacity=".62" d="M17 34 28 35 33 42 24 45 14 42z"/><circle cx="47" cy="20" r="3" fill="#5d251a"/></svg>',
  cube: '<svg viewBox="0 0 64 64" aria-hidden="true"><path fill="#f5efe2" d="M10 15 33 8 55 18 52 49 27 57 8 44z"/><path fill="#e0d6c8" d="M33 8 55 18 34 27 10 15z"/><path fill="#c9bfb2" opacity=".55" d="M34 27 55 18 52 49 27 57z"/><path fill="#ffffff" opacity=".62" d="M15 18 32 13 43 18 26 22z"/></svg>',
  egg: '<svg viewBox="0 0 64 64" aria-hidden="true"><path fill="#fff3d4" d="M32 6 45 14 54 31 52 47 40 58 24 58 12 47 10 31 19 14z"/><path fill="#ead9b5" opacity=".5" d="M45 14 54 31 52 47 40 58 33 43 35 24z"/><path fill="#f3bd25" d="M25 27 36 24 44 32 42 43 31 48 22 41z"/><path fill="#fff9e9" opacity=".58" d="M23 15 34 11 42 16 29 20z"/></svg>',
  beans: '<svg viewBox="0 0 64 64" aria-hidden="true"><path fill="#7a4f39" d="M15 15 29 8 41 16 42 31 31 43 17 41 8 30z"/><path fill="#4f7f48" d="M34 26 49 20 59 30 57 46 44 55 30 49 27 35z"/><path fill="#5a3528" opacity=".48" d="M29 8 41 16 42 31 31 43 28 27z"/><path fill="#2f5f36" opacity=".45" d="M49 20 59 30 57 46 44 55 42 39z"/></svg>'
};

let selected = [];
let recipes = [];
let recipesLoadError = null;

const grid = document.getElementById('protein-grid');
const counter = document.getElementById('counter');
const makeBtn = document.getElementById('make-btn');
const resetBtn = document.getElementById('reset-btn');
const remakeBtn = document.getElementById('remake-btn');
const hero = document.querySelector('.hero');
const results = document.getElementById('results');
const empty = document.getElementById('empty');

init();

async function init() {
  renderProteinCards();
  await loadRecipes();
  makeBtn.addEventListener('click', makeSchedule);
  resetBtn.addEventListener('click', resetSelection);
  remakeBtn.addEventListener('click', makeSchedule);
}

function renderProteinCards() {
  grid.innerHTML = proteins.map((protein) => `
    <button class="protein-card" style="--tone:${protein.tone}" data-id="${protein.id}" aria-pressed="false">
      <span class="check">✓</span>
      <span class="protein-inner">
        <span class="protein-name">${protein.name}</span>
        <span class="protein-icon">${icons[protein.icon]}</span>
      </span>
    </button>
  `).join('');

  grid.querySelectorAll('.protein-card').forEach((card) => {
    card.addEventListener('click', () => toggleProtein(card.dataset.id));
  });
}

async function loadRecipes() {
  try {
    const response = await fetch('./recipes.json');
    if (!response.ok) throw new Error(`recipes.json ${response.status}`);
    recipes = await response.json();
  } catch (error) {
    console.error(error);
    recipes = [];
    recipesLoadError = error;
  }
}

function toggleProtein(id) {
  if (selected.includes(id)) {
    selected = selected.filter((item) => item !== id);
  } else if (selected.length < 2) {
    selected = [...selected, id];
  }

  updateSelection();
}

function updateSelection() {
  grid.querySelectorAll('.protein-card').forEach((card) => {
    const isSelected = selected.includes(card.dataset.id);
    card.classList.toggle('selected', isSelected);
    card.setAttribute('aria-pressed', String(isSelected));
  });

  counter.textContent = `${selected.length}/2 선택`;
  makeBtn.disabled = selected.length !== 2;
  results.classList.remove('visible');
  empty.classList.remove('visible');
}

function makeSchedule() {
  if (!recipes.length) {
    showEmpty(recipesLoadError
      ? '레시피 DB를 아직 못 읽었어요. 배포 주소에서 다시 확인하거나 recipes.json 경로를 확인해주세요.'
      : '레시피 DB를 불러오는 중이에요. 잠시 후 다시 눌러주세요.');
    return;
  }

  const matches = recipes
    .map((recipe) => ({
      ...recipe,
      score: recipe.proteins.filter((protein) => selected.includes(protein)).length
    }))
    .filter((recipe) => recipe.score > 0)
    .sort((a, b) => b.score - a.score || Math.random() - 0.5);

  if (!matches.length) {
    showEmpty('선택한 단백질 조합에 맞는 레시피가 아직 부족해요. 다른 조합을 골라주세요.');
    results.classList.remove('visible');
    return;
  }

  const picked = pickBalanced(matches, selected);
  const schedule = buildSchedule(picked);

  renderResults(schedule, picked);
}

function pickBalanced(matches, selectedIds) {
  const picked = [];
  selectedIds.forEach((protein) => {
    const recipe = matches.find((item) => item.proteins.includes(protein) && !picked.includes(item));
    if (recipe) picked.push(recipe);
  });

  matches.forEach((recipe) => {
    if (picked.length < 3 && !picked.includes(recipe)) picked.push(recipe);
  });

  return picked.slice(0, 3);
}

function buildSchedule(picked) {
  const order = [0, 1, 0, 2, 1, 2];
  const counts = new Map();

  return order
    .map((recipeIndex, dayIndex) => {
      const recipe = picked[recipeIndex % picked.length];
      const count = (counts.get(recipe.id) || 0) + 1;
      counts.set(recipe.id, count);
      return {
        date: formatDate(dayIndex),
        recipe,
        serving: count,
        tone: getScheduleTone(recipeIndex)
      };
    })
    .filter((item) => item.serving <= 2);
}

function renderResults(schedule, picked) {
  const tags = document.getElementById('selected-tags');
  const scheduleEl = document.getElementById('schedule');
  const shopping = document.getElementById('shopping-list');

  tags.innerHTML = selected.map((id) => {
    const protein = proteins.find((item) => item.id === id);
    return `<span class="tag" aria-label="${protein.name}">${icons[protein.icon]}</span>`;
  }).join('');

  scheduleEl.innerHTML = schedule.map((item) => `
    <article class="day-card" style="--card-tone:${item.tone}">
      <div class="day-meta-row">
        <span>${item.date}</span>
        <span>${item.serving}/2회분</span>
      </div>
      <div class="meal-name">${item.recipe.name}</div>
      <div class="meal-meta">${item.recipe.note}</div>
      <div class="batch">${item.recipe.adult_tip}</div>
    </article>
  `).join('');

  const ingredients = [...new Set(picked.flatMap((recipe) => recipe.ingredients))];
  shopping.innerHTML = ingredients.map((item) => `<span class="shop-item">${item}</span>`).join('');

  empty.classList.remove('visible');
  hero.classList.add('hidden');
  results.classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetSelection() {
  selected = [];
  updateSelection();
  hero.classList.remove('hidden');
  results.classList.remove('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showEmpty(message) {
  empty.textContent = message;
  empty.classList.add('visible');
}

function getProteinName(id) {
  return proteins.find((protein) => protein.id === id)?.name || id;
}

function formatDate(offset) {
  const date = new Date();
  date.setDate(date.getDate() + offset);
  return `${date.getMonth() + 1}/${date.getDate()}`;
}

function getScheduleTone(index) {
  return ['#f2d0ca', '#efd8d3', '#e8c3bd'][index % 3];
}
</script>
