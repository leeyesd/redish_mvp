<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plati</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --border: #E8E4DF;
    --border-hover: #C8B8B8;
    --text: #1C1410;
    --text-2: #7A6A60;
    --text-3: #B0A09A;
    --red: #D94040;
    --red-bg: #FDF2F2;
    --red-border: #F0C8C8;
    --tag-bg: #F5F2EE;
    --selected-bg: #FDF2F2;
    --selected-border: #D94040;
    --selected-text: #B02020;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Gowun Dodum', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  /* ── HEADER ── */
  .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--red);
    letter-spacing: -0.5px;
    margin-bottom: 48px;
  }

  /* ── SECTION LABEL ── */
  .label {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 10px;
  }

  /* ── RECIPE INPUT ── */
  .url-section { margin-bottom: 36px; }

  .url-input-wrap {
    display: flex; gap: 8px; align-items: stretch;
  }
  .url-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
    min-height: 96px;
  }
  .url-input::placeholder { color: var(--text-3); }
  .url-input:focus { border-color: var(--red); }
  .url-ok-btn {
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    font-family: 'Gowun Dodum';
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .url-ok-btn:hover { background: var(--red); }
  .url-ok-btn:active { transform: scale(0.97); }

  .or-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 28px 0;
    color: var(--text-3); font-size: 12px;
  }
  .or-divider::before, .or-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── PROTEIN GRID ── */
  .protein-section { margin-bottom: 32px; }

  .protein-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .protein-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.3;
    user-select: none;
  }
  .protein-card:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }
  .protein-card.selected {
    background: var(--selected-bg);
    border-color: var(--selected-border);
    color: var(--selected-text);
    font-weight: 600;
  }
  .protein-card.faded {
    opacity: 0.35;
    pointer-events: none;
  }
  .protein-count {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 8px;
  }
  .protein-count span { color: var(--red); font-weight: 600; }

  /* ── SPICE ── */
  .spice-section { margin-bottom: 36px; }
  .spice-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .spice-btn {
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 8px 18px;
    font-family: 'Gowun Dodum';
    font-size: 13px;
    color: var(--text-2);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.15s;
  }
  .spice-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .spice-btn.selected {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  /* ── GENERATE BTN ── */
  .gen-btn {
    width: 100%;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-family: 'Gowun Dodum';
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .gen-btn:hover:not(:disabled) { background: #B83030; }
  .gen-btn:disabled {
    background: var(--border);
    color: var(--text-3);
    cursor: not-allowed;
  }

  /* ── LOADING ── */
  .loading {
    display: none;
    text-align: center;
    padding: 60px 0;
    color: var(--text-2);
  }
  .loading.visible { display: block; }
  .loading-text { font-size: 14px; margin-top: 16px; }
  .dot-anim { display: inline-flex; gap: 5px; }
  .dot-anim span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--red); display: inline-block;
    animation: blink 1.2s ease infinite;
  }
  .dot-anim span:nth-child(2) { animation-delay: 0.2s; }
  .dot-anim span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* ── RESULTS ── */
  #results { display: none; margin-top: 56px; }
  #results.visible { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .results-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap; gap: 8px;
  }
  .results-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px; color: var(--text);
  }
  .reset-btn {
    font-size: 12px; color: var(--text-3);
    background: none; border: none; cursor: pointer;
    text-decoration: underline; text-underline-offset: 2px;
  }
  .reset-btn:hover { color: var(--red); }

  /* Day cards */
  .week-grid {
    display: flex; flex-direction: column; gap: 0;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 36px;
  }
  .day-row {
    display: grid;
    grid-template-columns: 64px 1fr;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    transition: background 0.1s;
  }
  .day-row:last-child { border-bottom: none; }
  .day-row.today { background: #FFFAF8; }
  .day-label {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 16px 8px;
    border-right: 1px solid var(--border);
    background: var(--tag-bg);
  }
  .day-name {
    font-size: 14px; font-weight: 600; color: var(--text);
  }
  .day-date { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .today-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--red); margin-top: 4px;
  }
  .day-meals {
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .meal-item {
    display: flex; gap: 10px; align-items: flex-start;
  }
  .meal-time {
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding-top: 2px;
    min-width: 28px;
  }
  .meal-content { flex: 1; }
  .meal-name { font-size: 14px; color: var(--text); }
  .meal-note { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .meal-divider {
    height: 1px; background: var(--border); opacity: 0.5;
    margin: 0;
  }
  .repeat-badge {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--text-3);
    font-size: 10px;
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* Shopping list */
  .shopping-wrap {
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .shopping-header {
    background: var(--tag-bg);
    padding: 14px 18px;
    font-size: 13px; font-weight: 600; color: var(--text-2);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .shopping-body {
    padding: 16px 18px;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  .shop-cat-title {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-3); margin-bottom: 10px;
  }
  .shop-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0;
    cursor: pointer;
    font-size: 13px; color: var(--text);
    border-radius: 4px;
    transition: color 0.1s;
  }
  .shop-item:hover { color: var(--red); }
  .shop-item.done { text-decoration: line-through; color: var(--text-3); }
  .check {
    width: 16px; height: 16px; border-radius: 3px;
    border: 1.5px solid var(--border);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-size: 9px;
  }
  .shop-item.done .check {
    background: var(--text-3); border-color: var(--text-3); color: #fff;
  }

  /* Error */
  .error-box {
    display: none;
    background: var(--red-bg);
    border: 1px solid var(--red-border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--red);
    margin-top: 12px;
  }
  .error-box.visible { display: block; }

  @media (max-width: 560px) {
    .protein-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .protein-card { font-size: 11px; padding: 10px 4px; }
    .shopping-body { grid-template-columns: 1fr 1fr; }
    .day-row { grid-template-columns: 52px 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="brand">Plati</div>

  <!-- RECIPE INPUT -->
  <div class="url-section">
    <div class="label">레시피 입력</div>
    <div class="url-input-wrap">
      <textarea class="url-input" id="url-input"
        placeholder="여기에 레시피를 복붙하세요."></textarea>
      <button class="url-ok-btn" id="url-ok-btn" onclick="triggerFromUrl()">OK</button>
    </div>
  </div>

  <div class="or-divider">또는 단백질 직접 선택</div>

  <!-- PROTEIN GRID -->
  <div class="protein-section">
    <div class="label">단백질 선택 (최소 3개)</div>
    <div class="protein-grid" id="protein-grid"></div>
    <div class="protein-count" id="protein-count">선택 <span>0</span> / 3+</div>
  </div>

  <!-- SPICE -->
  <div class="spice-section">
    <div class="label">맵기</div>
    <div class="spice-row" id="spice-row">
      <button class="spice-btn selected" data-val="no" onclick="selectSpice(this)">🙅 전혀 안맵게</button>
      <button class="spice-btn" data-val="yes" onclick="selectSpice(this)">🌶 약간 괜찮음</button>
      <button class="spice-btn" data-val="hard" onclick="selectSpice(this)">🔥 매울수록 좋음</button>
      <button class="spice-btn" data-val="both" onclick="selectSpice(this)">👨‍👧 아이것 한번에</button>
    </div>
  </div>

  <!-- GENERATE -->
  <button class="gen-btn" id="gen-btn" disabled onclick="triggerFromProteins()">
    이번 주 식단 생성하기
  </button>

  <div class="error-box" id="error-box"></div>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="dot-anim"><span></span><span></span><span></span></div>
    <div class="loading-text" id="loading-text">레시피 분석 중...</div>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="results-meta">
      <div class="results-title">이번 주 식단</div>
      <button class="reset-btn" onclick="resetAll()">처음으로</button>
    </div>

    <div class="week-grid" id="week-grid"></div>

    <div class="shopping-wrap">
      <div class="shopping-header">
        <span>🛒 장보기 목록</span>
        <span style="font-size:11px;font-weight:400;color:var(--text-3)">클릭해서 체크</span>
      </div>
      <div class="shopping-body" id="shopping-body"></div>
    </div>
  </div>

</div>

<script>
const proteins = [
  '닭다리살','닭가슴살','소고기(구이)','소고기(국거리)',
  '돼지고기','오리고기','새우','계란','두부','참치'
];
const spiceLabels = { no:'전혀 안맵게', yes:'약간 매운맛', hard:'매운맛', both:'아이·어른 동시' };

let selectedProteins = [];
let spice = 'no';
let currentMode = null; // 'recipe' | 'protein'

// Build protein grid
const grid = document.getElementById('protein-grid');
proteins.forEach((p, i) => {
  const btn = document.createElement('div');
  btn.className = 'protein-card';
  btn.textContent = p;
  btn.dataset.idx = i;
  btn.onclick = () => toggleProtein(btn, p);
  grid.appendChild(btn);
});

function toggleProtein(btn, name) {
  if (btn.classList.contains('selected')) {
    selectedProteins = selectedProteins.filter(x => x !== name);
    btn.classList.remove('selected');
  } else {
    selectedProteins.push(name);
    btn.classList.add('selected');
  }
  document.getElementById('protein-count').innerHTML =
    `선택 <span>${selectedProteins.length}</span> / 3+`;
  document.getElementById('gen-btn').disabled = selectedProteins.length < 3;
  // unfade all when deselected below max
  document.querySelectorAll('.protein-card').forEach(c => c.classList.remove('faded'));
}

function selectSpice(el) {
  document.querySelectorAll('.spice-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  spice = el.dataset.val;
}

// ── TRIGGER FROM RECIPE ──
async function triggerFromUrl() {
  const recipe = document.getElementById('url-input').value.trim();
  if (!recipe) return;
  currentMode = 'recipe';
  await generate({ recipe });
}

// ── TRIGGER FROM PROTEINS ──
async function triggerFromProteins() {
  if (selectedProteins.length < 3) return;
  currentMode = 'protein';
  await generate({ proteins: selectedProteins });
}

// ── MAIN GENERATE ──
async function generate(input) {
  setLoading(true);
  hideError();
  document.getElementById('results').classList.remove('visible');

  const today = new Date();
  const dayOfWeek = today.getDay(); // 0=Sun
  const daysLeft = dayOfWeek === 0 ? 0 : 7 - dayOfWeek; // days until Sunday (inclusive today)
  const days = [];
  for (let i = 0; i <= daysLeft; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    days.push(d);
  }
  const dayNames = ['일','월','화','수','목','금','토'];
  const daysForPrompt = days.map(d =>
    `${dayNames[d.getDay()]}요일(${d.getMonth()+1}/${d.getDate()})`
  ).join(', ');

  const spiceDesc = {
    no: '맵지 않게. 고춧가루/매운양념 없이.',
    yes: '약간 매운 정도 괜찮음. 약한 매운맛.',
    hard: '매운 걸 좋아함. 충분히 매운 양념.',
    both: '아이와 어른이 함께 먹음. 기본 조리는 안맵게, 어른용 추가 양념 별도 제안.'
  }[spice];

  let userPrompt = '';
  if (input.recipe) {
    updateLoadingText('레시피 분석 중...');
    userPrompt = `
다음 레시피 내용을 기반으로 식단을 짜줘:

${input.recipe}
`;
  } else {
    updateLoadingText('메뉴 조합 중...');
    userPrompt = `
선택한 단백질: ${input.proteins.join(', ')}
`;
  }

  const systemPrompt = `
너는 Plati라는 식단 플래닝 서비스의 AI야.
목표: 재료를 최대한 겹치게 해서 낭비 없이 한 번 장보기로 주간 식단을 완성하는 것.

규칙:
- 맵기 기준: ${spiceDesc}
- 오늘(${dayNames[today.getDay()]}요일)부터 이번 주 일요일까지 점심/저녁 식단 구성.
- 대상 날짜: ${daysForPrompt}
- 한 번 요리로 2-3번 먹을 수 있게. 같은 메뉴가 2-3번 등장해도 OK.
- 아침은 포함하지 않아도 됨 (선택적으로만).
- 재료 겹치는 것을 최우선으로 메뉴 선정.

반드시 아래 JSON 형식으로만 응답해. 다른 텍스트 없이:
{
  "source_summary": "레시피/단백질 기반 요약 한 줄 (예: '닭다리살+두부+계란 기반 주간 식단')",
  "key_ingredients": ["핵심 재료1", "핵심 재료2", ...],
  "days": [
    {
      "date": "월/일",
      "day": "요일 (예: 월요일)",
      "is_today": true,
      "meals": [
        { "time": "점심", "name": "메뉴명", "note": "간단한 팁 (선택)", "repeat": false },
        { "time": "저녁", "name": "메뉴명", "note": "간단한 팁 (선택)", "repeat": true }
      ]
    }
  ],
  "shopping": {
    "proteins": ["재료명 + 양", ...],
    "vegetables": ["재료명 + 양", ...],
    "pantry": ["재료명", ...]
  }
}

repeat: true = 이 메뉴가 다른 날에도 등장하는 메뉴임 (재사용 표시용).
`;

  try {
    updateLoadingText('식단 구성 중...');
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: systemPrompt,
        user: userPrompt
      })
    });

    if (!res.ok) throw new Error(`API error: ${res.status}`);
    const data = await res.json();
    const raw = data.text || '';

    // Parse JSON (strip markdown fences if any)
    const cleaned = raw.replace(/```json|```/g, '').trim();
    const plan = JSON.parse(cleaned);

    setLoading(false);
    renderResults(plan);
  } catch (err) {
    setLoading(false);
    showError('식단 생성 중 오류가 발생했어요. 잠시 후 다시 시도해주세요. (' + err.message + ')');
    console.error(err);
  }
}

function renderResults(plan) {
  // Week grid
  const weekGrid = document.getElementById('week-grid');
  weekGrid.innerHTML = '';

  plan.days.forEach(day => {
    const row = document.createElement('div');
    row.className = 'day-row' + (day.is_today ? ' today' : '');
    row.innerHTML = `
      <div class="day-label">
        <div class="day-name">${day.day.replace('요일','')}</div>
        <div class="day-date">${day.date}</div>
        ${day.is_today ? '<div class="today-dot"></div>' : ''}
      </div>
      <div class="day-meals">
        ${day.meals.map((m, i) => `
          ${i > 0 ? '<div class="meal-divider"></div>' : ''}
          <div class="meal-item">
            <span class="meal-time">${m.time}</span>
            <div class="meal-content">
              <div class="meal-name">
                ${m.name}
                ${m.repeat ? '<span class="repeat-badge">재사용</span>' : ''}
              </div>
              ${m.note ? `<div class="meal-note">${m.note}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `;
    weekGrid.appendChild(row);
  });

  // Shopping
  const body = document.getElementById('shopping-body');
  body.innerHTML = '';

  const cats = [
    { key: 'proteins', label: '단백질' },
    { key: 'vegetables', label: '채소·재료' },
    { key: 'pantry', label: '기본 재료' }
  ];
  cats.forEach(cat => {
    const items = plan.shopping[cat.key] || [];
    if (!items.length) return;
    const col = document.createElement('div');
    col.innerHTML = `
      <div class="shop-cat-title">${cat.label}</div>
      ${items.map(item => `
        <div class="shop-item" onclick="toggleShop(this)">
          <div class="check"></div>
          ${item}
        </div>
      `).join('')}
    `;
    body.appendChild(col);
  });

  document.getElementById('results').classList.add('visible');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleShop(el) {
  el.classList.toggle('done');
  if (el.classList.contains('done')) {
    el.querySelector('.check').textContent = '✓';
  } else {
    el.querySelector('.check').textContent = '';
  }
}

function setLoading(on) {
  document.getElementById('loading').classList.toggle('visible', on);
  document.getElementById('gen-btn').disabled = on || selectedProteins.length < 3;
  document.getElementById('url-ok-btn').disabled = on;
}
function updateLoadingText(txt) {
  document.getElementById('loading-text').textContent = txt;
}
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg; el.classList.add('visible');
}
function hideError() {
  document.getElementById('error-box').classList.remove('visible');
}
function resetAll() {
  selectedProteins = [];
  document.querySelectorAll('.protein-card').forEach(c => {
    c.classList.remove('selected','faded');
  });
  document.getElementById('protein-count').innerHTML = '선택 <span>0</span> / 3+';
  document.getElementById('gen-btn').disabled = true;
  document.getElementById('url-input').value = '';
  document.getElementById('results').classList.remove('visible');
  document.getElementById('error-box').classList.remove('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
