<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plati</title>
<style>
  @font-face {
    font-family: "Kkukkukk";
    src: url("./assets/fonts/MemomentKkukkukk.ttf") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --ink: #050505;
    --muted: #515151;
    --paper: #fbfaf3;
    --red: #f35a42;
    --blue: #a9c3e8;
    --lavender: #c9bfff;
    --pink: #efbed7;
    --yellow: #f2ef56;
    --green: #71b394;
    --brown: #bd806f;
    --shadow: 0 16px 36px rgba(0, 0, 0, .08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Kkukkukk", "Apple SD Gothic Neo", "Pretendard", system-ui, sans-serif;
    color: var(--ink);
    background: #f2f0e8;
  }

  button, input { font: inherit; }

  .app {
    position: relative;
    width: min(430px, 100%);
    min-height: 100vh;
    margin: 0 auto;
    padding: 30px 28px 48px;
    background: var(--paper);
    box-shadow: var(--shadow);
  }

  .app::before,
  .app::after {
    content: none;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0;
    background: transparent;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0;
  }

  .hero {
    margin: 34px 0 20px;
    text-align: left;
  }

  h1 {
    margin: 0 auto;
    max-width: 350px;
    font-size: clamp(38px, 11vw, 54px);
    line-height: .92;
    letter-spacing: 0;
    text-wrap: balance;
    color: var(--ink);
    font-weight: 400;
  }

  .mark {
    display: inline-block;
    color: var(--ink);
  }

  h1 .red-word {
    color: var(--red);
  }

  .protein-wrap {
    margin-top: 32px;
    padding: 0;
    background: transparent;
  }

  .protein-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .protein-card {
    position: relative;
    min-height: 148px;
    border: 0;
    border-radius: 34px;
    background: var(--tone);
    box-shadow: none;
    cursor: pointer;
    transform: translateY(0);
    transition: transform .16s ease, filter .16s ease, opacity .16s ease;
    overflow: hidden;
  }

  .protein-card::before {
    content: none;
  }

  .protein-card::after {
    content: none;
  }

  .protein-card:hover {
    transform: translateY(-2px);
  }

  .protein-card.selected {
    transform: translateY(-3px);
    filter: saturate(1.08) contrast(1.04);
  }

  .protein-card.selected .check { opacity: 1; transform: scale(1); }

  .protein-inner {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    padding: 19px 19px 17px;
  }

  .protein-icon {
    display: grid;
    place-items: center;
    width: 54px;
    height: 54px;
    margin-top: auto;
    color: #000;
  }

  .protein-icon svg {
    width: 100%;
    height: 100%;
    display: block;
    fill: currentColor;
    stroke: currentColor;
  }

  .protein-name {
    font-size: 19px;
    line-height: 1.05;
    color: #000;
  }

  .check {
    position: absolute;
    right: 13px;
    bottom: 13px;
    z-index: 2;
    width: 28px;
    height: 28px;
    display: grid;
    place-items: center;
    border: 0;
    border-radius: 999px;
    background: #000;
    color: #fff;
    opacity: 0;
    transform: scale(.6);
    transition: .16s ease;
  }

  .subcopy {
    max-width: 310px;
    margin: 24px 0 0;
    font-size: 14px;
    line-height: 1.7;
    color: var(--muted);
    text-align: left;
    font-weight: 400;
  }

  .action-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 22px;
    flex-wrap: wrap;
  }

  .counter {
    border: 0;
    border-radius: 999px;
    padding: 10px 14px;
    background: #ece8dd;
    color: #000;
  }

  .make-btn, .reset-btn {
    border: 0;
    border-radius: 999px;
    padding: 12px 16px;
    cursor: pointer;
    box-shadow: none;
    transition: transform .12s ease, opacity .12s ease;
  }

  .make-btn {
    background: #000;
    color: #fff;
  }

  .make-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  .reset-btn { background: #ece8dd; color: #000; }

  .make-btn:not(:disabled):hover,
  .reset-btn:hover {
    transform: translateY(-3px);
  }

  .results {
    display: none;
    margin-top: 34px;
    border: 0;
    border-radius: 32px;
    background: #fff;
    box-shadow: none;
    overflow: hidden;
  }

  .results.visible { display: block; }

  .result-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 18px;
    border-bottom: 1px solid #eee9de;
    background: #fff;
  }

  .result-title {
    font-size: 22px;
    color: #000;
  }

  .selected-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  .tag {
    border: 0;
    border-radius: 999px;
    padding: 6px 10px;
    background: #fff;
    font-size: 13px;
    background: #ece8dd;
    color: #000;
  }

  .schedule {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    padding: 18px;
  }

  .day-card {
    border: 0;
    border-radius: 24px;
    background: #f5f2ea;
    box-shadow: none;
    padding: 15px;
  }

  .day-card:nth-child(3n+1) { background: #f5f2ea; }
  .day-card:nth-child(3n+2) { background: #ece8dd; }
  .day-card:nth-child(3n) { background: #f8f0d8; }

  .day-label {
    display: inline-block;
    border: 0;
    border-radius: 999px;
    padding: 5px 9px;
    background: #000;
    color: #fff;
    font-size: 12px;
  }

  .meal-name {
    margin-top: 12px;
    font-size: 19px;
    line-height: 1.28;
    color: #000;
  }

  .meal-meta {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    font-weight: 400;
  }

  .batch {
    display: inline-block;
    margin-top: 10px;
    border-radius: 10px;
    padding: 6px 8px;
    background: #fff;
    color: #000;
    font-size: 12px;
    font-weight: 700;
  }

  .shopping {
    padding: 0 18px 18px;
  }

  .shopping-box {
    border: 0;
    border-radius: 24px;
    background: #f5f2ea;
    padding: 15px;
  }

  .shopping-title {
    color: #000;
    margin-bottom: 10px;
  }

  .shopping-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .shop-item {
    border: 0;
    border-radius: 999px;
    padding: 7px 10px;
    background: #fff;
    font-size: 13px;
    font-weight: 400;
  }

  .empty {
    display: none;
    margin-top: 18px;
    border: 0;
    border-radius: 24px;
    padding: 14px;
    background: #fff;
    box-shadow: none;
    text-align: center;
  }

  .empty.visible { display: block; }

  @media (max-width: 430px) {
    body { background: var(--paper); }
    .app { min-height: 100vh; margin: 0 auto; box-shadow: none; }
    .result-head { align-items: flex-start; flex-direction: column; }
    .selected-tags { justify-content: flex-start; }
  }
</style>
</head>
<body>
<main class="app">
  <div class="brand">Plati</div>

  <section class="hero">
    <h1><span class="mark">3가지 고르면</span><br><span class="red-word">저녁메뉴</span> 고민 끝</h1>

    <div class="protein-wrap" aria-label="단백질 선택">
      <div class="protein-grid" id="protein-grid"></div>
    </div>

    <p class="subcopy">매운양념만 추가하면 어른 것까지 해결되는 유아식 레시피로만 저녁메뉴 제안한다</p>

    <div class="action-row">
      <div class="counter" id="counter">0 / 3 선택</div>
      <button class="make-btn" id="make-btn" disabled>저녁 스케줄 보기</button>
      <button class="reset-btn" id="reset-btn">다시 고르기</button>
    </div>

    <div class="empty" id="empty">선택한 단백질에 맞는 레시피가 아직 부족해요. recipes.json에 메뉴를 더 넣어주세요.</div>
  </section>

  <section class="results" id="results" aria-live="polite">
    <div class="result-head">
      <div class="result-title">이번 주 저녁 루틴</div>
      <div class="selected-tags" id="selected-tags"></div>
    </div>
    <div class="schedule" id="schedule"></div>
    <div class="shopping">
      <div class="shopping-box">
        <div class="shopping-title">한 번 장볼 것</div>
        <div class="shopping-list" id="shopping-list"></div>
      </div>
    </div>
  </section>
</main>

<script>
const proteins = [
  { id: 'chicken', name: '닭고기', icon: 'drumstick', tone: '#ff7a4d' },
  { id: 'beef', name: '소고기', icon: 'steak', tone: '#c8bfff' },
  { id: 'pork', name: '돼지고기', icon: 'meat', tone: '#efbed7' },
  { id: 'fish', name: '흰살생선', icon: 'fish', tone: '#a9c3e8' },
  { id: 'salmon', name: '연어', icon: 'fish', tone: '#f2ef56' },
  { id: 'shrimp', name: '새우', icon: 'shrimp', tone: '#ff7a4d' },
  { id: 'tofu', name: '두부', icon: 'cube', tone: '#71b394' },
  { id: 'egg', name: '계란', icon: 'egg', tone: '#f2ef56' },
  { id: 'bean', name: '콩', icon: 'beans', tone: '#bd806f' },
  { id: 'cheese', name: '치즈', icon: 'cheese', tone: '#c8bfff' }
];

const icons = {
  drumstick: '<svg viewBox="0 0 64 64" aria-hidden="true"><path d="M39 8c11 0 19 8 19 18 0 12-10 22-23 22-3 0-5-1-8-2l-8 8c-4 4-11 1-11-5 0-2 1-4 3-5-4-1-6-7-2-11l8-8c-1-3-2-5-2-8C15 12 26 8 39 8z"/></svg>',
  steak: '<svg viewBox="0 0 64 64" aria-hidden="true"><path d="M33 7c15 0 25 9 25 22 0 17-14 28-31 28C15 57 6 50 6 39 6 21 17 7 33 7zm-4 16c-6 0-10 4-10 9s4 9 10 9 10-4 10-9-4-9-10-9z"/></svg>',
  meat: '<svg viewBox="0 0 64 64" aria-hidden="true"><path d="M14 18c0-7 5-12 12-12 4 0 7 2 9 5 2-3 5-5 9-5 7 0 12 5 12 12 0 8-7 14-16 14H30c-5 0-8 3-8 8v8c0 6-4 10-10 10S2 54 2 48V28c0-6 5-10 12-10z"/></svg>',
  fish: '<svg viewBox="0 0 64 64" aria-hidden="true"><path d="M36 14c10 0 18 7 23 17-5 10-13 17-23 17-8 0-15-4-20-10L5 47V17l11 9c5-8 12-12 20-12z"/></svg>',
  shrimp: '<svg viewBox="0 0 64 64" aria-hidden="true"><path d="M42 8c10 0 18 8 18 18 0 17-17 30-35 30-11 0-19-6-19-15 0-7 5-12 12-12 6 0 10 3 12 8 7-3 12-7 12-12 0-4-3-7-8-7h-7c-4 0-7-2-7-5s3-5 7-5h15z"/></svg>',
  cube: '<svg viewBox="0 0 64 64" aria-hidden="true"><path d="M14 10h36c3 0 5 2 5 5v34c0 3-2 5-5 5H14c-3 0-5-2-5-5V15c0-3 2-5 5-5z"/></svg>',
  egg: '<svg viewBox="0 0 64 64" aria-hidden="true"><path d="M32 5c13 0 23 18 23 33 0 13-10 21-23 21S9 51 9 38C9 23 19 5 32 5z"/></svg>',
  beans: '<svg viewBox="0 0 64 64" aria-hidden="true"><path d="M23 10c8 0 14 7 14 17S31 45 23 45 9 38 9 28 15 10 23 10zm22 11c7 0 12 6 12 15s-5 16-12 16-12-7-12-16 5-15 12-15z"/></svg>',
  cheese: '<svg viewBox="0 0 64 64" aria-hidden="true"><path d="M8 45 52 9c3-3 8 0 8 4v36c0 3-2 5-5 5H11c-5 0-7-6-3-9zm33-4a5 5 0 1 0 0-10 5 5 0 0 0 0 10z"/></svg>'
};

let selected = [];
let recipes = [];

const grid = document.getElementById('protein-grid');
const counter = document.getElementById('counter');
const makeBtn = document.getElementById('make-btn');
const resetBtn = document.getElementById('reset-btn');
const results = document.getElementById('results');
const empty = document.getElementById('empty');

init();

async function init() {
  renderProteinCards();
  await loadRecipes();
  makeBtn.addEventListener('click', makeSchedule);
  resetBtn.addEventListener('click', resetSelection);
}

function renderProteinCards() {
  grid.innerHTML = proteins.map((protein) => `
    <button class="protein-card" style="--tone:${protein.tone}" data-id="${protein.id}" aria-pressed="false">
      <span class="check">✓</span>
      <span class="protein-inner">
        <span class="protein-name">${protein.name}</span>
        <span class="protein-icon">${icons[protein.icon]}</span>
      </span>
    </button>
  `).join('');

  grid.querySelectorAll('.protein-card').forEach((card) => {
    card.addEventListener('click', () => toggleProtein(card.dataset.id));
  });
}

async function loadRecipes() {
  try {
    const response = await fetch('/recipes.json');
    recipes = await response.json();
  } catch {
    recipes = [];
  }
}

function toggleProtein(id) {
  if (selected.includes(id)) {
    selected = selected.filter((item) => item !== id);
  } else if (selected.length < 3) {
    selected = [...selected, id];
  }

  updateSelection();
}

function updateSelection() {
  grid.querySelectorAll('.protein-card').forEach((card) => {
    const isSelected = selected.includes(card.dataset.id);
    card.classList.toggle('selected', isSelected);
    card.setAttribute('aria-pressed', String(isSelected));
  });

  counter.textContent = `${selected.length} / 3 선택`;
  makeBtn.disabled = selected.length !== 3;
  results.classList.remove('visible');
  empty.classList.remove('visible');
}

function makeSchedule() {
  const matches = recipes
    .map((recipe) => ({
      ...recipe,
      score: recipe.proteins.filter((protein) => selected.includes(protein)).length
    }))
    .filter((recipe) => recipe.score > 0)
    .sort((a, b) => b.score - a.score || b.batch_servings - a.batch_servings);

  if (!matches.length) {
    empty.classList.add('visible');
    results.classList.remove('visible');
    return;
  }

  const picked = pickBalanced(matches, selected);
  const days = ['오늘', '내일', '모레', '4일차', '5일차', '6일차'];
  const schedule = buildSchedule(picked, days);

  renderResults(schedule, picked);
}

function pickBalanced(matches, selectedIds) {
  const picked = [];
  selectedIds.forEach((protein) => {
    const recipe = matches.find((item) => item.proteins.includes(protein) && !picked.includes(item));
    if (recipe) picked.push(recipe);
  });

  matches.forEach((recipe) => {
    if (picked.length < 4 && !picked.includes(recipe)) picked.push(recipe);
  });

  return picked.slice(0, 4);
}

function buildSchedule(picked, days) {
  const schedule = [];
  let dayIndex = 0;

  picked.forEach((recipe) => {
    const servings = Math.max(1, Math.min(recipe.batch_servings || 2, 2));
    for (let i = 0; i < servings && dayIndex < days.length; i += 1) {
      schedule.push({
        day: days[dayIndex],
        recipe,
        repeat: i > 0
      });
      dayIndex += 1;
    }
  });

  return schedule.slice(0, 6);
}

function renderResults(schedule, picked) {
  const tags = document.getElementById('selected-tags');
  const scheduleEl = document.getElementById('schedule');
  const shopping = document.getElementById('shopping-list');

  tags.innerHTML = selected.map((id) => `<span class="tag">${getProteinName(id)}</span>`).join('');

  scheduleEl.innerHTML = schedule.map((item) => `
    <article class="day-card">
      <div class="day-label">${item.day}${item.repeat ? ' · 소분' : ' · 조리'}</div>
      <div class="meal-name">${item.recipe.name}</div>
      <div class="meal-meta">${item.recipe.note}</div>
      <div class="batch">${item.recipe.adult_tip}</div>
    </article>
  `).join('');

  const ingredients = [...new Set(picked.flatMap((recipe) => recipe.ingredients))];
  shopping.innerHTML = ingredients.map((item) => `<span class="shop-item">${item}</span>`).join('');

  empty.classList.remove('visible');
  results.classList.add('visible');
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetSelection() {
  selected = [];
  updateSelection();
}

function getProteinName(id) {
  return proteins.find((protein) => protein.id === id)?.name || id;
}
</script>
</body>
</html>
