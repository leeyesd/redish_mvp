<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plati</title>
<style>
  :root {
    --ink: #27364a;
    --muted: #5f6f6a;
    --paper: #fffdf6;
    --paper-2: #f7f0e4;
    --red: #df3e25;
    --blue: #244f9e;
    --green: #4f8a47;
    --tape: #f5d000;
    --line: rgba(39, 54, 74, .42);
    --shadow: 0 18px 45px rgba(18, 45, 22, .24);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Comic Sans MS", "Apple SD Gothic Neo", "Pretendard", system-ui, sans-serif;
    color: var(--ink);
    background:
      linear-gradient(rgba(32, 73, 42, .06), rgba(32, 73, 42, .2)),
      url("./assets/meadow-bg.svg");
    background-size: cover, cover;
    background-position: center;
    background-attachment: fixed;
  }

  button, input { font: inherit; }

  .app {
    position: relative;
    width: min(430px, 100%);
    min-height: calc(100vh - 52px);
    margin: 26px auto;
    padding: 34px 20px 40px;
    background:
      linear-gradient(90deg, rgba(36,79,158,.035) 1px, transparent 1px),
      linear-gradient(rgba(36,79,158,.025) 1px, transparent 1px),
      radial-gradient(circle at 20% 18%, rgba(223,62,37,.04), transparent 28%),
      var(--paper);
    background-size: 22px 22px, 22px 22px, auto, auto;
    border-radius: 4px;
    box-shadow: var(--shadow);
  }

  .app::before,
  .app::after {
    content: "";
    position: absolute;
    left: 50%;
    z-index: 2;
    width: 118px;
    height: 42px;
    background:
      linear-gradient(110deg, rgba(255,255,255,.26), transparent 34%),
      linear-gradient(90deg, rgba(181,142,0,.18), transparent 16% 84%, rgba(181,142,0,.2)),
      var(--tape);
    box-shadow: 0 5px 12px rgba(44, 42, 10, .18);
    opacity: .95;
  }

  .app::before {
    top: -18px;
    transform: translateX(-50%) rotate(-2deg);
  }

  .app::after {
    bottom: -18px;
    transform: translateX(-50%) rotate(4deg);
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(39,54,74,.2);
    border-radius: 999px;
    padding: 6px 12px;
    background: rgba(255,255,255,.55);
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: .08em;
  }

  .hero {
    margin: 38px 0 20px;
    text-align: center;
  }

  h1 {
    margin: 0 auto;
    max-width: 350px;
    font-size: clamp(42px, 13vw, 62px);
    line-height: .88;
    letter-spacing: 0;
    text-wrap: balance;
    color: var(--blue);
    font-weight: 400;
  }

  .mark {
    display: inline-block;
    transform: rotate(-1.5deg);
    color: var(--blue);
  }

  h1 .red-word {
    color: var(--red);
  }

  .protein-wrap {
    margin-top: 30px;
    padding: 14px 10px 10px;
    border: 1px solid rgba(39,54,74,.12);
    border-radius: 6px;
    background:
      radial-gradient(circle at 16px 0, transparent 9px, rgba(255,255,255,.72) 10px),
      rgba(255,255,255,.5);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.55);
  }

  .protein-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 9px;
  }

  .protein-card {
    position: relative;
    min-height: 92px;
    border: 1px solid rgba(39,54,74,.24);
    border-radius: 3px;
    background:
      linear-gradient(90deg, rgba(36,79,158,.03) 1px, transparent 1px),
      linear-gradient(rgba(36,79,158,.025) 1px, transparent 1px),
      var(--paper-2);
    background-size: 14px 14px;
    box-shadow: 0 6px 12px rgba(33, 54, 42, .1);
    cursor: pointer;
    transform: translateY(0) rotate(var(--tilt));
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    overflow: hidden;
  }

  .protein-card::before {
    content: "";
    position: absolute;
    inset: auto 10px 8px;
    height: 3px;
    border-radius: 999px;
    background: var(--tone);
    opacity: .75;
  }

  .protein-card::after {
    content: "";
    position: absolute;
    width: 16px;
    height: 16px;
    right: 9px;
    top: 8px;
    border: 1px solid rgba(39,54,74,.18);
    border-radius: 50%;
    background: var(--tone);
  }

  .protein-card:hover {
    transform: translateY(-2px) rotate(0);
    box-shadow: 0 9px 15px rgba(33, 54, 42, .13);
  }

  .protein-card.selected {
    border-color: var(--red);
    transform: translateY(-3px) rotate(0);
    box-shadow: 0 10px 18px rgba(171, 57, 34, .18);
  }

  .protein-card.selected .check { opacity: 1; transform: scale(1); }

  .protein-inner {
    position: relative;
    z-index: 1;
    height: 100%;
    display: grid;
    place-items: center;
    gap: 5px;
    padding: 14px 8px 12px;
  }

  .protein-icon {
    display: grid;
    place-items: center;
    width: 42px;
    height: 42px;
    border: 1px solid rgba(39,54,74,.18);
    border-radius: 50%;
    background: rgba(255,255,255,.74);
    font-size: 24px;
  }

  .protein-name {
    font-weight: 700;
    font-size: 14px;
    color: var(--blue);
  }

  .check {
    position: absolute;
    left: 8px;
    top: 8px;
    z-index: 2;
    width: 24px;
    height: 24px;
    display: grid;
    place-items: center;
    border: 1px solid rgba(39,54,74,.18);
    border-radius: 50%;
    background: var(--red);
    color: #fff;
    font-weight: 700;
    opacity: 0;
    transform: scale(.6);
    transition: .16s ease;
  }

  .subcopy {
    max-width: 310px;
    margin: 24px auto 0;
    font-size: 14px;
    line-height: 1.7;
    color: var(--muted);
    text-align: center;
    font-weight: 400;
  }

  .action-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 22px;
    flex-wrap: wrap;
  }

  .counter {
    border: 1px solid rgba(39,54,74,.22);
    border-radius: 999px;
    padding: 9px 13px;
    background: rgba(255,255,255,.7);
    font-weight: 700;
    color: var(--blue);
  }

  .make-btn, .reset-btn {
    border: 1px solid rgba(39,54,74,.26);
    border-radius: 999px;
    padding: 12px 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 13px rgba(33, 54, 42, .12);
    transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
  }

  .make-btn {
    background: var(--blue);
    color: #fff;
  }

  .make-btn:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  .reset-btn { background: rgba(255,255,255,.75); color: var(--blue); }

  .make-btn:not(:disabled):hover,
  .reset-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 18px rgba(33, 54, 42, .16);
  }

  .results {
    display: none;
    margin-top: 34px;
    border: 1px solid rgba(39,54,74,.18);
    border-radius: 5px;
    background: rgba(255, 253, 246, .82);
    box-shadow: 0 12px 28px rgba(18, 45, 22, .18);
    overflow: hidden;
  }

  .results.visible { display: block; }

  .result-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 18px;
    border-bottom: 1px solid rgba(39,54,74,.18);
    background: rgba(245, 208, 0, .28);
  }

  .result-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--blue);
  }

  .selected-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  .tag {
    border: 1px solid rgba(39,54,74,.18);
    border-radius: 999px;
    padding: 6px 10px;
    background: #fff;
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
  }

  .schedule {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    padding: 18px;
  }

  .day-card {
    border: 1px solid rgba(39,54,74,.18);
    border-radius: 4px;
    background: rgba(255,255,255,.72);
    box-shadow: 0 6px 13px rgba(33, 54, 42, .1);
    padding: 15px;
  }

  .day-card:nth-child(3n+1) { background: rgba(255,255,255,.76); }
  .day-card:nth-child(3n+2) { background: rgba(247,240,228,.76); }
  .day-card:nth-child(3n) { background: rgba(255,251,236,.76); }

  .day-label {
    display: inline-block;
    border: 1px solid rgba(39,54,74,.18);
    border-radius: 999px;
    padding: 5px 9px;
    background: var(--blue);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
  }

  .meal-name {
    margin-top: 12px;
    font-size: 19px;
    line-height: 1.28;
    font-weight: 700;
    color: var(--blue);
  }

  .meal-meta {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    font-weight: 400;
  }

  .batch {
    display: inline-block;
    margin-top: 10px;
    border-radius: 10px;
    padding: 6px 8px;
    background: rgba(223, 62, 37, .1);
    color: var(--red);
    font-size: 12px;
    font-weight: 700;
  }

  .shopping {
    padding: 0 18px 18px;
  }

  .shopping-box {
    border: 1px solid rgba(39,54,74,.18);
    border-radius: 4px;
    background: rgba(255,255,255,.72);
    padding: 15px;
  }

  .shopping-title {
    font-weight: 700;
    color: var(--blue);
    margin-bottom: 10px;
  }

  .shopping-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .shop-item {
    border: 1px solid rgba(39,54,74,.18);
    border-radius: 999px;
    padding: 7px 10px;
    background: rgba(255,253,246,.8);
    font-size: 13px;
    font-weight: 400;
  }

  .empty {
    display: none;
    margin-top: 18px;
    border: 1px solid rgba(39,54,74,.18);
    border-radius: 4px;
    padding: 14px;
    background: #fff;
    box-shadow: 0 8px 18px rgba(33, 54, 42, .12);
    font-weight: 700;
    text-align: center;
  }

  .empty.visible { display: block; }

  @media (max-width: 430px) {
    body { background: var(--paper); }
    .app { min-height: 100vh; margin: 0 auto; box-shadow: none; }
    .result-head { align-items: flex-start; flex-direction: column; }
    .selected-tags { justify-content: flex-start; }
  }
</style>
</head>
<body>
<main class="app">
  <div class="brand">Plati</div>

  <section class="hero">
    <h1><span class="mark">3가지 고르면</span><br><span class="red-word">저녁메뉴</span> 고민 끝</h1>

    <div class="protein-wrap" aria-label="단백질 선택">
      <div class="protein-grid" id="protein-grid"></div>
    </div>

    <p class="subcopy">매운양념만 추가하면 어른 것까지 해결되는 유아식 레시피로만 저녁메뉴 제안한다</p>

    <div class="action-row">
      <div class="counter" id="counter">0 / 3 선택</div>
      <button class="make-btn" id="make-btn" disabled>저녁 스케줄 보기</button>
      <button class="reset-btn" id="reset-btn">다시 고르기</button>
    </div>

    <div class="empty" id="empty">선택한 단백질에 맞는 레시피가 아직 부족해요. recipes.json에 메뉴를 더 넣어주세요.</div>
  </section>

  <section class="results" id="results" aria-live="polite">
    <div class="result-head">
      <div class="result-title">이번 주 저녁 루틴</div>
      <div class="selected-tags" id="selected-tags"></div>
    </div>
    <div class="schedule" id="schedule"></div>
    <div class="shopping">
      <div class="shopping-box">
        <div class="shopping-title">한 번 장볼 것</div>
        <div class="shopping-list" id="shopping-list"></div>
      </div>
    </div>
  </section>
</main>

<script>
const proteins = [
  { id: 'chicken', name: '닭고기', icon: '🍗', tone: '#d55b43', tilt: '-1.5deg' },
  { id: 'beef', name: '소고기', icon: '🥩', tone: '#b84835', tilt: '1.2deg' },
  { id: 'pork', name: '돼지고기', icon: '🥓', tone: '#dd8c64', tilt: '-.8deg' },
  { id: 'fish', name: '흰살생선', icon: '🐟', tone: '#5f86ba', tilt: '1deg' },
  { id: 'salmon', name: '연어', icon: '🍣', tone: '#dd6f51', tilt: '-1.4deg' },
  { id: 'shrimp', name: '새우', icon: '🍤', tone: '#d9a23b', tilt: '1.4deg' },
  { id: 'tofu', name: '두부', icon: '□', tone: '#7aa768', tilt: '-.9deg' },
  { id: 'egg', name: '계란', icon: '◯', tone: '#d4b640', tilt: '.9deg' },
  { id: 'bean', name: '콩', icon: '• •', tone: '#6e9a52', tilt: '-1.2deg' },
  { id: 'cheese', name: '치즈', icon: '△', tone: '#d7ae2f', tilt: '1.5deg' }
];

let selected = [];
let recipes = [];

const grid = document.getElementById('protein-grid');
const counter = document.getElementById('counter');
const makeBtn = document.getElementById('make-btn');
const resetBtn = document.getElementById('reset-btn');
const results = document.getElementById('results');
const empty = document.getElementById('empty');

init();

async function init() {
  renderProteinCards();
  await loadRecipes();
  makeBtn.addEventListener('click', makeSchedule);
  resetBtn.addEventListener('click', resetSelection);
}

function renderProteinCards() {
  grid.innerHTML = proteins.map((protein) => `
    <button class="protein-card" style="--tone:${protein.tone}; --tilt:${protein.tilt}" data-id="${protein.id}" aria-pressed="false">
      <span class="check">✓</span>
      <span class="protein-inner">
        <span class="protein-icon">${protein.icon}</span>
        <span class="protein-name">${protein.name}</span>
      </span>
    </button>
  `).join('');

  grid.querySelectorAll('.protein-card').forEach((card) => {
    card.addEventListener('click', () => toggleProtein(card.dataset.id));
  });
}

async function loadRecipes() {
  try {
    const response = await fetch('/recipes.json');
    recipes = await response.json();
  } catch {
    recipes = [];
  }
}

function toggleProtein(id) {
  if (selected.includes(id)) {
    selected = selected.filter((item) => item !== id);
  } else if (selected.length < 3) {
    selected = [...selected, id];
  }

  updateSelection();
}

function updateSelection() {
  grid.querySelectorAll('.protein-card').forEach((card) => {
    const isSelected = selected.includes(card.dataset.id);
    card.classList.toggle('selected', isSelected);
    card.setAttribute('aria-pressed', String(isSelected));
  });

  counter.textContent = `${selected.length} / 3 선택`;
  makeBtn.disabled = selected.length !== 3;
  results.classList.remove('visible');
  empty.classList.remove('visible');
}

function makeSchedule() {
  const matches = recipes
    .map((recipe) => ({
      ...recipe,
      score: recipe.proteins.filter((protein) => selected.includes(protein)).length
    }))
    .filter((recipe) => recipe.score > 0)
    .sort((a, b) => b.score - a.score || b.batch_servings - a.batch_servings);

  if (!matches.length) {
    empty.classList.add('visible');
    results.classList.remove('visible');
    return;
  }

  const picked = pickBalanced(matches, selected);
  const days = ['오늘', '내일', '모레', '4일차', '5일차', '6일차'];
  const schedule = buildSchedule(picked, days);

  renderResults(schedule, picked);
}

function pickBalanced(matches, selectedIds) {
  const picked = [];
  selectedIds.forEach((protein) => {
    const recipe = matches.find((item) => item.proteins.includes(protein) && !picked.includes(item));
    if (recipe) picked.push(recipe);
  });

  matches.forEach((recipe) => {
    if (picked.length < 4 && !picked.includes(recipe)) picked.push(recipe);
  });

  return picked.slice(0, 4);
}

function buildSchedule(picked, days) {
  const schedule = [];
  let dayIndex = 0;

  picked.forEach((recipe) => {
    const servings = Math.max(1, Math.min(recipe.batch_servings || 2, 2));
    for (let i = 0; i < servings && dayIndex < days.length; i += 1) {
      schedule.push({
        day: days[dayIndex],
        recipe,
        repeat: i > 0
      });
      dayIndex += 1;
    }
  });

  return schedule.slice(0, 6);
}

function renderResults(schedule, picked) {
  const tags = document.getElementById('selected-tags');
  const scheduleEl = document.getElementById('schedule');
  const shopping = document.getElementById('shopping-list');

  tags.innerHTML = selected.map((id) => `<span class="tag">${getProteinName(id)}</span>`).join('');

  scheduleEl.innerHTML = schedule.map((item) => `
    <article class="day-card">
      <div class="day-label">${item.day}${item.repeat ? ' · 소분' : ' · 조리'}</div>
      <div class="meal-name">${item.recipe.name}</div>
      <div class="meal-meta">${item.recipe.note}</div>
      <div class="batch">${item.recipe.adult_tip}</div>
    </article>
  `).join('');

  const ingredients = [...new Set(picked.flatMap((recipe) => recipe.ingredients))];
  shopping.innerHTML = ingredients.map((item) => `<span class="shop-item">${item}</span>`).join('');

  empty.classList.remove('visible');
  results.classList.add('visible');
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetSelection() {
  selected = [];
  updateSelection();
}

function getProteinName(id) {
  return proteins.find((protein) => protein.id === id)?.name || id;
}
</script>
</body>
</html>
